<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hello World</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            background: #f5f5f5;
        }

        #toggleBtn {
            padding: 12px 24px;
            font-size: 18px;
            border: none;
            border-radius: 8px;
            background: #0078d4;
            color: white;
            cursor: pointer;
        }

        #toggleBtn:hover {
            background: #005ea6;
        }
    </style>
</head>
<body>
    <button id="toggleBtn">Toggle</button>
</body>
</html>
